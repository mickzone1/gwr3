<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdUHK GWR - Admin Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #082C56 0%, #407692 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(8, 44, 86, 0.9);
            border: 2px solid #C19A3B;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        header h1 {
            color: #C19A3B;
            font-size: 2rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(193, 154, 59, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #C19A3B;
        }

        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .filters {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filters input,
        .filters select {
            padding: 12px 16px;
            border: 2px solid rgba(193, 154, 59, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 1rem;
        }

        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #C19A3B;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #C19A3B, #d4a942);
            color: #082C56;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: #ffffff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #f87171);
            color: #ffffff;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(193, 154, 59, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(193, 154, 59, 0.2);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .status-approved {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid #4ade80;
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .video-link {
            color: #60a5fa;
            text-decoration: none;
        }

        .video-link:hover {
            text-decoration: underline;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #082C56, #407692);
            border: 2px solid #C19A3B;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(193, 154, 59, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 1rem;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            .filters {
                flex-direction: column;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 1000px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 EdUHK GWR - Admin Portal</h1>
            <button class="btn btn-primary" onclick="exportCSV()">📥 Export CSV</button>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalSubmissions">0</div>
                <div class="stat-label">Total Submissions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedCount">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rejectedCount">0</div>
                <div class="stat-label">Rejected</div>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="searchName" placeholder="Search by name..." oninput="filterTable()">
            <input type="email" id="searchEmail" placeholder="Search by email..." oninput="filterTable()">
            <select id="filterStatus" onchange="filterTable()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
            <input type="date" id="filterDate" onchange="filterTable()">
        </div>

        <div class="table-container">
            <table id="participantsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>WhatsApp</th>
                        <th>Upload Date</th>
                        <th>Status</th>
                        <th>Video</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Video Preview Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Video Preview</h2>
                <button class="close-btn" onclick="closeModal('videoModal')">&times;</button>
            </div>
            <div id="videoPreview"></div>
        </div>
    </div>

    <!-- Edit Status Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Update Status</h2>
                <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
            </div>
            <form id="editForm" onsubmit="updateStatus(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Participant Name</label>
                    <input type="text" id="editName" disabled>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus" required>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Admin Notes</label>
                    <textarea id="editNotes" placeholder="Add notes about this submission..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';
        let allParticipants = [];

        // Load participants on page load
        document.addEventListener('DOMContentLoaded', loadParticipants);

        async function loadParticipants() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/participants`);
                const result = await response.json();

                if (result.success) {
                    allParticipants = result.data;
                    renderTable(allParticipants);
                    updateStats(allParticipants);
                }
            } catch (error) {
                console.error('Error loading participants:', error);
                alert('Failed to load participants. Make sure the backend server is running.');
            }
        }

        function renderTable(participants) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            participants.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <strong>${p.familyName}, ${p.firstName}</strong>
                    </td>
                    <td>${p.email}</td>
                    <td>${p.whatsappTel || 'N/A'}</td>
                    <td>${new Date(p.uploadedAt).toLocaleDateString()}</td>
                    <td>
                        <span class="status-badge status-${p.status}">${p.status}</span>
                    </td>
                    <td>
                        <a href="${p.video.sharePointLink}" target="_blank" class="video-link">
                            🎬 Watch Video
                        </a>
                    </td>
                    <td class="actions">
                        <button class="btn btn-primary" onclick="openEditModal('${p._id}')">
                            ✏️ Edit
                        </button>
                        <button class="btn btn-danger" onclick="deleteParticipant('${p._id}')">
                            🗑️ Delete
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats(participants) {
            document.getElementById('totalSubmissions').textContent = participants.length;
            document.getElementById('pendingCount').textContent = 
                participants.filter(p => p.status === 'pending').length;
            document.getElementById('approvedCount').textContent = 
                participants.filter(p => p.status === 'approved').length;
            document.getElementById('rejectedCount').textContent = 
                participants.filter(p => p.status === 'rejected').length;
        }

        function filterTable() {
            const nameSearch = document.getElementById('searchName').value.toLowerCase();
            const emailSearch = document.getElementById('searchEmail').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const dateFilter = document.getElementById('filterDate').value;

            const filtered = allParticipants.filter(p => {
                const fullName = `${p.familyName} ${p.firstName}`.toLowerCase();
                const matchesName = fullName.includes(nameSearch);
                const matchesEmail = p.email.toLowerCase().includes(emailSearch);
                const matchesStatus = !statusFilter || p.status === statusFilter;
                const matchesDate = !dateFilter || 
                    new Date(p.uploadedAt).toISOString().startsWith(dateFilter);

                return matchesName && matchesEmail && matchesStatus && matchesDate;
            });

            renderTable(filtered);
        }

        function openEditModal(id) {
            const participant = allParticipants.find(p => p._id === id);
            if (!participant) return;

            document.getElementById('editId').value = id;
            document.getElementById('editName').value = 
                `${participant.firstName} ${participant.familyName}`;
            document.getElementById('editStatus').value = participant.status;
            document.getElementById('editNotes').value = participant.adminNotes || '';

            document.getElementById('editModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        async function updateStatus(event) {
            event.preventDefault();

            const id = document.getElementById('editId').value;
            const status = document.getElementById('editStatus').value;
            const adminNotes = document.getElementById('editNotes').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/participants/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status, adminNotes })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Status updated successfully!');
                    closeModal('editModal');
                    loadParticipants();
                }
            } catch (error) {
                alert('Failed to update status: ' + error.message);
            }
        }

        async function deleteParticipant(id) {
            if (!confirm('Are you sure you want to delete this participant? This cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/participants/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    alert('Participant deleted successfully!');
                    loadParticipants();
                }
            } catch (error) {
                alert('Failed to delete: ' + error.message);
            }
        }

        async function exportCSV() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/export/csv`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `participants_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('Failed to export: ' + error.message);
            }
        }
    </script>
</body>
</html>
